name: CI

# When does this workflow run?
on:
  push:
    branches: ['**']   # every branch — get feedback before opening a PR
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest

    # All `run:` commands below execute inside backend/.
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'  # cache pip downloads between runs for speed

      - name: Install backend with dev dependencies
        # `pip install -e ".[dev]"` installs the backend package in editable mode
        # plus the [dev] optional-dependencies group (pytest, httpx, pytest-cov).
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        # --cov=app           : measure coverage of the app package
        # --cov-report=term-missing : show which lines aren't covered
        # --cov-fail-under=80 : fail the build if coverage drops below 80%
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80
