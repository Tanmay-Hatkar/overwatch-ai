# railway.toml — Railway deployment configuration for the Overwatch backend.
#
# Railway uses Nixpacks to build the container from the Python project
# (detected via pyproject.toml). The start command below is what Railway
# runs once the build succeeds.
#
# Bind to 0.0.0.0:$PORT so Railway's proxy can reach the container.
# Railway injects the $PORT env var; don't hardcode 8000.
#
# Healthcheck pings GET /health every few seconds; if it returns non-2xx,
# Railway restarts the container.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips=*"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
